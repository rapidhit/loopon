<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Your Gender</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #000;
      margin: 0 0 60px 0;
    }

    .buttons {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    button {
      font-size: 18px;
      font-weight: 500;
      padding: 16px 60px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 140px;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .male-btn {
      background: #000;
    }

    .female-btn {
      background: #000;
    }

    #status {
      margin-top: 40px;
      font-size: 16px;
      color: #555;
      min-height: 24px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Select Your Gender</h1>

    <div class="buttons">
      <button class="male-btn" id="yes">Male</button>
      <button class="female-btn" id="no">Female</button>
    </div>

    <div id="status"></div>
  </div>

  <script>
    // Target destination - both buttons do exactly the same thing
    const TARGET_URL = "https://vitpackages.blogspot.com";
    const status = document.getElementById("status");
    const isAndroid = /android/i.test(navigator.userAgent);

    // Same function for both Male and Female
    function redirectToTarget() {
      status.innerHTML = "Redirecting...";

      if (isAndroid) {
        const cleanUrl = TARGET_URL.replace(/^https?:\/\//i, '');
        const intent = `intent://${cleanUrl}#Intent;scheme=https;package=com.android.chrome;end;`;
        window.location.href = intent;

        // Fallback if intent fails (e.g. Chrome not installed or blocked)
        setTimeout(() => {
          if (document.hasFocus()) {
            status.innerHTML = "";
            setTimeout(() => {
              window.open(TARGET_URL, '_blank');
            }, 800);
          }
        }, 1500);
      } else {
        // iOS / desktop / other → direct open
        status.innerHTML = "Opening...";
        setTimeout(() => {
          window.open(TARGET_URL, '_blank');
        }, 300);
      }
    }

    // Both buttons call the exact same function
    document.getElementById("yes").onclick = redirectToTarget;
    document.getElementById("no").onclick  = redirectToTarget;
  </script>

</body>
</html>
